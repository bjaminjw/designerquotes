<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fashion Quote Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
  padding: 40px 0;
  font-family: Georgia, serif;
  background: transparent;

  display: flex;
  justify-content: center;
    }

    .card {
      width: 300px;
  text-align: center;
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  margin: 16px auto;
  box-sizing: border-box;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
    }

    .quote {
      font-size: 16px;
  line-height: 1.35;
  margin-bottom: 10px;
  max-width: 260px;
  margin-left: auto;
  margin-right: auto;
    }

    .name {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
    }
  </style>
</head>

<body>

<div class="card">
  <img id="portrait" alt="Designer portrait">
  <div class="quote" id="quote"></div>
  <div class="name" id="name"></div>
</div>

<script>
const designers = [
  {
    name: "Coco Chanel",
    quote: "Fashion fades, only style remains the same.",
    image: "images/chanel.webp"
  },
  {
    name: "Alexander McQueen",
    quote: "You have to know the rules to break them.",
    image: "images/alexander.jpg"
  },
  {
    name: "Vivienne Westwood",
    quote: "Buy less, choose well, make it last.",
    image: "images/westwood.webp"
  },
  {
    name: "Christian Dior",
    quote: "Elegance must be the right combination of distinction, naturalness, care and simplicity.",
    image: "images/dior.webp"
  },
  {
    name: "Thomas Burberry",
    quote: "There's no such thing as bad weather, just bad clothing.",
    image: "images/burberry.webp"
  },
  {
    name: "Rei Kawakubo",
    quote: "Creation takes things forward. Without anything new there is no progress. Creation equals new.",
    image: "images/kawakubo.jpg"
  },
  {
    name: "Issey Miyake",
    quote: "When I make something, it's only half finished.",
    image: "images/issey.webp"
  },
  {
    name: "Yohji Yamamoto",
    quote: "Black is modest and arrogant at the same time. Black is lazy and easy — but mysterious. But above all black says this: 'I don't bother you — don't bother me.'",
    image: "images/yohji.avif"
  },
  {
    name: "Yves Saint Laurent",
    quote: "Fashions fade, style is eternal.",
    image: "images/ysl.jpg"
  }
];

// Change quote every page reload
const pick = designers[Math.floor(Math.random() * designers.length)];

// Display content
document.getElementById("quote").textContent = `"${pick.quote}"`;
document.getElementById("name").textContent = pick.name;
document.getElementById("portrait").src = pick.image;
</script>

</body>
</html>
